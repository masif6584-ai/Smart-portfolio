<!-- SHOOTING STARS -->
<script>
const canvas=document.getElementById('shooting-stars');
const ctx=canvas.getContext('2d');
canvas.width=innerWidth;
canvas.height=innerHeight;

let stars=[];
function createStar(){return {x:Math.random()*canvas.width,y:0,speed:8}}
function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);
if(Math.random()<0.05)stars.push(createStar());

stars.forEach((s,i)=>{
ctx.beginPath();
ctx.moveTo(s.x,s.y);
ctx.lineTo(s.x-50,s.y+50);
ctx.strokeStyle="white";
ctx.stroke();

s.x-=s.speed;
s.y+=s.speed;

if(s.y>canvas.height)stars.splice(i,1);
});
requestAnimationFrame(draw);
}
draw();
</script>

<!-- CLOCK -->
<script>
function updateClock(){
const now=new Date();
const s=now.getSeconds();
const m=now.getMinutes();
const h=now.getHours();

document.getElementById('sec').style.transform=`rotate(${s*6}deg)`;
document.getElementById('min').style.transform=`rotate(${m*6}deg)`;
document.getElementById('hour').style.transform=`rotate(${h*30+m/2}deg)`;
}
setInterval(updateClock,1000);
updateClock();
</script>
