            text-transform: uppercase; position: relative; color: var(--accent);
            text-shadow: 0 0 30px var(--accent); animation: glitch 3s infinite;

        @keyframes glitch {
            0% { transform: skew(0deg); }
            20% { transform: skew(3deg); color: var(--primary); }
            40% { transform: skew(-3deg); }
            100% { transform: skew(0deg); }
        }

        /* CLOCK WITH INTERNAL LOGO */
        .analog-clock {

        }

        .hand { position: absolute; bottom: 50%; left: 50%; transform-origin: bottom; border-radius: 10px; z-index: 5; }
        .hour { width: 8px; height: 60px; background: white; }
        .min { width: 5px; height: 90px; background: var(--accent); }
        .sec { width: 2px; height: 100px; background: var(--primary); }

        }
        .features-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
        .f-card {
            background: var(--card-bg); padding: 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05);
            transition: 0.3s; font-size: 0.9rem; text-align: center;

        .p-card {
            height: 400px; border-radius: 30px; position: relative; overflow: hidden;
            border: 2px solid rgba(255,255,255,0.1); background: #111;
        }
        .p-overlay {
            position: absolute; bottom: 0; width: 100%; height: 50%;
            background: linear-gradient(to top, black, transparent);
            padding: 30px; display: flex; flex-direction: column; justify-content: flex-end;

</head>
