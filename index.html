<!-- STAR BACKGROUND -->
<script>
const c=document.getElementById("stars-bg");
const ctx=c.getContext("2d");
c.width=innerWidth;c.height=innerHeight;

let stars=[];
for(let i=0;i<80;i++){
stars.push({x:Math.random()*c.width,y:Math.random()*c.height,size:Math.random()*2,speed:Math.random()*0.5});
}

function animate(){
ctx.clearRect(0,0,c.width,c.height);
stars.forEach(s=>{
ctx.beginPath();
ctx.arc(s.x,s.y,s.size,0,Math.PI*2);
ctx.fillStyle="white";
ctx.fill();
s.y+=s.speed;
if(s.y>c.height)s.y=0;
});
requestAnimationFrame(animate);
}
animate();
</script>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, update, increment, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
apiKey:"PASTE_YOUR_KEY",
databaseURL:"PASTE_DB_URL"
};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);
const statsRef=ref(db,'stats');

update(statsRef,{count:increment(1)});

onValue(statsRef,(snap)=>{
document.getElementById("count").innerText=snap.val()?.count || 1;
});
</script>
